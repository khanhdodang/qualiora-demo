name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Import results to Qualiora
        if: ${{ secrets.QUALIORA_CI_PASSWORD != '' }}
        env:
          QUALIORA_API_URL: ${{ secrets.QUALIORA_API_URL }}
          QUALIORA_CI_EMAIL: ${{ secrets.QUALIORA_CI_EMAIL }}
          QUALIORA_CI_PASSWORD: ${{ secrets.QUALIORA_CI_PASSWORD }}
          QUALIORA_PROJECT_KEY: DEMO
          QUALIORA_ENVIRONMENT_ID: ${{ secrets.QUALIORA_ENVIRONMENT_ID }}
        run: node scripts/qualiora-import.mjs test-results/results.json

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/results.json
          retention-days: 14
